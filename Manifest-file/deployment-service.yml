# Based on Jenkins-Server-TF from https://github.com/AmanPathak-DevOps/End-to-End-Kubernetes-DevSecOps-Tetris-Project

apiVersion: apps/v1
kind: Deployment
metadata:
  name: tetris
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tetris
  template:
    metadata:
      labels:
        app: tetris
    spec:
      containers:
        - name: tetris
          image: itoniton/tetrisv1:3
          imagePullPolicy: Always
          ports:
            - containerPort: 3000

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          command: ["/bin/sh"]
          args:
            - -c
            - |
              echo "window.POD_NAME='${POD_NAME}';" > /usr/share/nginx/html/pod.js
              echo "window.NODE_NAME='${NODE_NAME}';" >> /usr/share/nginx/html/pod.js
              nginx -g 'daemon off;'

---
apiVersion: v1
kind: Service
metadata:
  name: tetris-service
spec:
  selector:
    app: tetris
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer